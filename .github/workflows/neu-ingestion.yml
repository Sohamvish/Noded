name: NEU Data Ingestion

on:
  schedule:
    # Daily at 3:00 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Noded repository
        uses: actions/checkout@v4

      - name: Checkout NEU repository
        uses: actions/checkout@v4
        with:
          repository: NotEnoughUpdates/NotEnoughUpdates-REPO
          path: neu-data

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run NEU ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEU_REPO_PATH: ./neu-data
        run: npm run ingest
